name: Build d3d11-spoof

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        arch: [ x86_64, i686 ]

    steps:
    - name: Check out repo
      uses: actions/checkout@v4

    - name: Install MinGW-w64
      run: |
        sudo apt-get update
        sudo apt-get install -y mingw-w64

    - name: Compile for ${{ matrix.arch }}
      run: |
        if [ "${{ matrix.arch }}" = "x86_64" ]; then
          TRIPLET=x86_64-w64-mingw32
        else
          TRIPLET=i686-w64-mingw32
        fi
        
        # 1. Dynamically locate the C++ file if names are misaligned or capitalised
        TARGET_SOURCE=$(find . -iname "d3d11_proxy.cpp" | head -n 1)
        
        if [ -z "$TARGET_SOURCE" ]; then
          echo "ERROR: Could not find any file named d3d11_proxy.cpp anywhere in the repo!"
          echo "Here are the files currently present:"
          find . -maxdepth 3 -not -path '*/.*'
          exit 1
        fi
        
        echo "Found source file at: $TARGET_SOURCE"
        
        # 2. Setup safe build folder paths
        mkdir -p build/${{ matrix.arch }}
        
        # 3. Direct compile execution
        ${TRIPLET}-g++ \
          -shared -o build/${{ matrix.arch }}/d3d11.dll \
          -DWIN32_LEAN_AND_MEAN \
          -municode \
          -I /usr/${TRIPLET}/include \
          "$TARGET_SOURCE" \
          -L /usr/${TRIPLET}/lib -ld3d11 -ldxgi \
          -Wl,--kill-at

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: d3d11-spoof-${{ matrix.arch }}
        path: build/${{ matrix.arch }}/d3d11.dll
